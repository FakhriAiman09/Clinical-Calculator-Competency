name: SonarCloud Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # pinned v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Jest with coverage
        working-directory: frontend
        run: npx jest --coverage --coverageReporters=lcov --coverageDirectory=coverage
        env:
          CI: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python test dependencies
        working-directory: python/infer
        run: pip install pytest pytest-cov

      - name: Run Python tests with coverage
        working-directory: python/infer
        run: python -m pytest test/test_benchmark.py test/test.py --cov=. --cov-report=xml:coverage.xml --ignore=test/tempCodeRunnerFile.py
        env:
          PYTHONPATH: '.'

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@e44258b109568baa0df60ed515909fc6c72cba92
        # pinned to v2 commit SHA
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
