sonar.projectKey=FakhriAiman09_Clinical-Calculator-Competency
sonar.organization=fakhri-aiman09
sonar.projectName=Clinical-Calculator-Competency
sonar.sourceEncoding=UTF-8
sonar.python.version=3.13

# Analyze application code while keeping test folders separate.
sonar.sources=frontend/src,mcq-sample-collect/src,server/socketio,python
sonar.tests=frontend/__tests__,testing,python/bert/test,python/svm/test,python/infer/test

# Keep generated assets, coverage output, and tests out of source analysis.
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/public/**,**/*.svg,**/*.png,**/*.ico,**/*.ipynb,python/**/test/**,frontend/__tests__/**,testing/**
sonar.test.inclusions=frontend/__tests__/**,testing/**,python/**/test/**

# Reuse existing JavaScript/TypeScript coverage output when it is generated locally or in CI.
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,testing/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info,testing/coverage/lcov.info

# These app areas are intentionally mirrored between frontend and mcq-sample-collect.
# Generated coverage HTML is also repeated by design. Keep the files in normal
# analysis where applicable, but exclude them from duplicate-code checks.
sonar.cpd.exclusions=frontend/src/app/dashboard/admin/edit-questions-options/**/*,frontend/src/app/dashboard/admin/form/**/*,mcq-sample-collect/src/app/admin/edit-questions-options/**/*,mcq-sample-collect/src/app/form/**/*,testing/coverage/**/*,testing/coverage/lcov-report/**/*
