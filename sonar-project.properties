sonar.projectKey=FakhriAiman09_Clinical-Calculator-Competency
sonar.organization=fakhri-aiman09
sonar.projectName=Clinical-Calculator-Competency
sonar.sourceEncoding=UTF-8
sonar.python.version=3.13

# Analyze the active application code only. The mcq-sample-collect folder is an
# old copied app and is intentionally excluded from analysis.
sonar.sources=frontend/src,server/socketio,python
sonar.tests=frontend/__tests__,python/bert/test,python/svm/test,python/infer/test

# Keep copied projects, generated assets, generated reports, coverage output,
# and tests out of source analysis.
sonar.exclusions=mcq-sample-collect/**,testing/**,**/__tests__/**,**/__test__/**,frontend/__tests__/**,**/node_modules/**,**/.next/**,**/coverage/**,**/lcov-report/**,**/public/**,**/*.svg,**/*.png,**/*.ico,**/*.ipynb,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,python/**/test/**
sonar.test.inclusions=frontend/__tests__/**,python/**/test/**

# Reuse existing JavaScript/TypeScript coverage output when it is generated locally or in CI.
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

# Duplicate-code analysis should ignore tests, generated files, coverage output,
# and old copied project folders.
sonar.cpd.exclusions=mcq-sample-collect/**,testing/**,**/__tests__/**,**/__test__/**,frontend/__tests__/**,**/coverage/**,**/lcov-report/**,**/.next/**,**/node_modules/**,**/public/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.svg,**/*.png,**/*.ico,**/*.ipynb
